name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        variant: [gpu, cpu]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "0.11.7"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build binary with PyInstaller
        run: |
          $spec = if ("${{ matrix.variant }}" -eq "cpu") { "speakeasy-cpu.spec" } else { "speakeasy.spec" }
          uv run pyinstaller $spec

      - name: Install Inno Setup
        run: choco install innosetup --version=6.7.1 -y --no-progress

      - name: Build GUI installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $iss = if ("${{ matrix.variant }}" -eq "cpu") { "installer\speakeasy-cpu-setup.iss" } else { "installer\speakeasy-setup.iss" }
          & $iscc $iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-${{ matrix.variant }}
          path: installer/Output/*.exe
          retention-days: 1

  release:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download GPU installer
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installer-gpu
          path: installer/Output/

      - name: Download CPU installer
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installer-cpu
          path: installer/Output/

      - name: Generate checksums
        run: |
          $installers = Get-ChildItem "installer\Output\*.exe"
          $lines = @()
          foreach ($installer in $installers) {
            $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash
            $lines += "$hash  $($installer.Name)"
          }
          $lines | Out-File -FilePath "installer\Output\SHA256SUMS.txt" -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            installer/Output/SpeakEasy-AI-Setup-*.exe
            installer/Output/SpeakEasy-AI-CPU-Setup-*.exe
            installer/Output/SHA256SUMS.txt
          body_path: installer/Output/release-notes.md
          draft: false
